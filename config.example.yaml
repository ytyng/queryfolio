# QueryFolio 設定ファイルのサンプル。
# ~/.config/queryfolio/config.yml (または config.yaml) に置く。
#
# 開発・テスト用に QUERYFOLIO_CONFIG_YAML 環境変数でこのファイル全体の内容を
# 上書きできる (GUI を Finder / Dock から起動した場合、shell の環境変数は渡らない)。

# --- sql_servers (接続定義。sql-agent-mcp-server 互換) ---

sql_servers:
  - name: dev-postgres
    description: "開発環境の PostgreSQL サーバー"
    engine: postgres
    host: localhost
    port: 5432
    schema: development_db
    user: dev_user
    password: your_password_here

  - name: dev-mysql
    description: "開発環境の MySQL サーバー"
    engine: mysql
    host: localhost
    port: 3306
    schema: test_db
    user: mysql_user
    password: your_mysql_password

  # queryfolio 拡張: sqlite は schema に DB ファイルパスを指定する
  - name: local-sqlite
    description: "ローカルの SQLite ファイル"
    engine: sqlite
    schema: ~/data/example.sqlite3

  # queryfolio 拡張: readonly: true (省略時 false) を指定すると、
  # 書き込み系の文 (INSERT / UPDATE / DELETE / DDL、CTE 付き DML、
  # SELECT INTO 等) の実行を拒否する。
  # SELECT に副作用のある関数 (nextval 等) までは防げない。
  # あくまで事故防止のガード。
  - name: production-replica
    description: "本番レプリカ (読み取り専用)"
    engine: mysql
    host: replica.example.com
    port: 3306
    schema: production_db
    user: replica_user
    password: replica_password
    readonly: true

  # queryfolio 拡張: allow_dangerous_statements (省略時 false)。
  # 省略時は、危険な文 (WHERE 無しの UPDATE / DELETE、DROP、TRUNCATE) を
  # 誤操作による全行破壊・テーブル消失防止のため拒否する。
  # true にするとこれらの文を実行できるが、実行前に確認ダイアログが出る。
  - name: dev-db
    description: "開発用 DB (危険な文も確認の上で実行できる)"
    engine: postgres
    host: localhost
    port: 5432
    schema: dev
    user: dev_user
    password: dev_password
    allow_dangerous_statements: true

  - name: remote-db-with-ssh
    description: "SSH トンネル経由でアクセスするリモートデータベース"
    engine: postgres
    host: localhost  # SSH トンネル経由の場合、踏み台から見た DB ホストを指定
    port: 5432
    schema: remote_db
    user: remote_user
    password: remote_password
    ssh_tunnel:
      host: ssh.example.com
      port: 22
      user: ssh_user
      # password: ssh_password  # または private_key_path を使用
      private_key_path: ~/.ssh/id_rsa
      # private_key_passphrase: key_passphrase
      # When no password/private_key_path is set, the SSH agent is used.
      # The agent socket is resolved from ~/.ssh/config (IdentityAgent) and
      # then SSH_AUTH_SOCK. Override it here if the app is launched in an
      # environment that does not inherit the right socket (e.g. the
      # 1Password SSH agent when launched from Finder). "none" disables the agent.
      # identity_agent: ~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock

  - name: remote-db-via-ssh-config
    description: "~/.ssh/config の Host エイリアスで接続 (ProxyJump / 多段トンネル対応)"
    engine: postgres
    host: localhost  # 踏み台 (ssh_config の最終ホスト) から見た DB ホスト
    port: 5432
    schema: remote_db
    user: remote_user
    password: remote_password
    ssh_tunnel:
      # queryfolio extension: delegate the tunnel to the system `ssh` client
      # using this ~/.ssh/config Host alias. HostName / User / Port / ProxyJump
      # (multi-hop) are all resolved by OpenSSH, so a config like
      #   Host pop-three-ec2-staging
      #       HostName 172.21.122.39
      #       User torico
      #       ProxyJump pop-three-bastion
      # just works by naming the alias here. host / user / private_key_path /
      # identity_agent above are ignored in this mode (auth and host-key
      # checking are handled entirely by OpenSSH).
      ssh_config: pop-three-ec2-staging

# --- sql_servers: グループ機能 (queryfolio 拡張) ---
# リスト項目に group_name + sql_servers を書くと、その中のサーバーが
# 接続一覧でグループ見出し付きで表示される。直書きサーバーとの混在も可
# (設定した順序のまま表示される)。グループの中にさらにグループは書けない。
# グループ内でも template: による雛形継承は使える。
#
# sql_servers:
#   - group_name: production
#     sql_servers:
#       - name: prod-main
#         engine: mysql
#         host: prod.example.com
#         ...
#       - name: prod-replica
#         engine: mysql
#         host: replica.example.com
#         ...
#   - group_name: development
#     sql_servers:
#       - name: dev-db
#         engine: postgres
#         host: localhost
#         ...
#   - name: ungrouped-db   # グループ無しの直書きも混在できる
#     engine: sqlite
#     schema: ~/data/example.sqlite3

# --- 設定を外部から上書きする (任意) ---
# config_override_command に書いたコマンドを実行し、その stdout (YAML) を
# この設定へ再帰的にマージする。取得した YAML 側が優先。
#
# マージ規則:
#   - マッピング同士は再帰的に混ざる (例: ai の api_key だけ差し替え)
#   - スカラーとリスト (sql_servers を含む) は丸ごと置き換わる
#   - sql_servers に限らずどのキーでも上書きできる
#
# 取得した YAML の中に config_override_command があっても再帰取得はしない。
# コマンドはシェル非経由で実行される (パイプやリダイレクトは使えない)。
#
# 1Password から取得する例:
# config_override_command: op read "op://development/queryfolio/config-yaml"

# --- 接続情報の雛形 ---
# sql_servers 側で template: <名前> を指定して継承できる。
# サーバー側で指定したキーはテンプレートの同名キーを上書きする (シャローマージ)。
sql_server_templates:
  - name: my-awesome-sql-host
    engine: mysql
    host: db.example.com
    port: 3306
    user: shared_user
    password: shared_password

# --- AI (自然言語 → SQL 生成) の設定 (任意) ---
# ここ (ローカル config.yml のトップレベル)、または config_override_command で
# 取得する YAML のトップレベルに書ける。マージの結果、取得 YAML 側が優先される
# (API キーを 1Password 内の YAML に置けば、ローカルに平文で残らない)。
# ai:
#   provider: openai   # 現状 openai のみ対応
#   api_key: sk-your-api-key
#   model: gpt-5.1     # 任意 (省略時 gpt-5.1)
#   base_url: https://api.openai.com/v1  # 任意 (OpenAI 互換 API 用)

# --- LIMIT 未指定の SELECT に自動付与する行数上限 (任意。デフォルト 500、0 で無効) ---
# default_limit: 500

# --- クエリファイルの保存先 (任意。デフォルト ~/.config/queryfolio/sqlfiles) ---
# sqlfiles_dir: ~/queries
#
# クエリファイルは <sqlfiles_dir>/<フォルダ名>/<name>.sql に保存される。
# フォルダ名は接続ごとに次のルールで決まる (接続 name は使わない):
#   - サーバーに folder_name を指定していればそれを使う
#   - 無ければ <host>_<engine>_<schema>_<user> を組み立てる
# 例: 上の dev-postgres は "localhost_postgres_development_db_dev_user"。
# folder_name を明示するとフォルダ名を固定できる (host 等を変えても移動しない):
#   - name: dev-postgres
#     folder_name: dev-pg
#     engine: postgres
#     ...
