name: Release

# 手動実行 (workflow_dispatch) のみ。push では自動ビルドしない。
# ローカルからは `pnpm release [patch|minor|major]` で起動する (scripts/release.sh)。
on:
  workflow_dispatch:

# GitHub Release の作成とアセットアップロードに contents: write が必要。
permissions:
  contents: write

# 同時に走らないよう直列化する。cancel-in-progress は付けない: 1 回の dispatch が
# 1 つの version に対応するため、後発の run で先発をキャンセルすると、その version の
# Release だけが (bump コミットは main に載ったまま) 永久に公開されない状態になる。
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel / Apple Silicon 両対応の universal バイナリを dmg で配布する。
          # 署名は下記ステップで Developer ID + 公証 (notarization)。ローカルビルドは
          # tauri.conf.json の signingIdentity "-" で ad-hoc、CI は APPLE_SIGNING_IDENTITY が
          # それを上書きする (tauri-cli の優先順位: env > config)。
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
          # Windows は署名なしの NSIS インストーラー (.exe) のみ。MSI は作らない。
          - platform: windows-latest
            rust-targets: ''
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      # persist-credentials: false — checkout が write 権限の GITHUB_TOKEN を
      # .git/config に残さないようにする。以降のステップ (pnpm install の install
      # script や third-party action) がそれを拾えないようにするため。
      # Apple の証明書を扱うジョブなので `uses:` は全て commit SHA に固定する
      # (tauri-action だけ固定しても、先行ステップの action が改変されれば同じ)。
      # 更新時は行末の `# v4` 等のコメントを頼りに新しい SHA を調べて置き換える。
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust (cargo + target)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 署名・公証の Secret が 1 つでも欠けていると、tauri-action には空文字が渡るだけで
      # ビルドは通ってしまう (ad-hoc 署名や公証なしの成果物ができる)。publish ジョブは
      # 成否しか見ないため、そのまま「署名 + 公証済み」のつもりで公開される。ここで
      # 明示的に落として、配布不能な dmg が公開されるのを防ぐ。
      - name: Check macOS signing secrets
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
            APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}. Signing and notarization would be silently skipped; see the publish-macos-release skill for the one-time setup."
            exit 1
          fi
          echo "All signing and notarization secrets are present."

      # macOS のみ: Developer ID 証明書を一時 keychain にインポートする。
      # tauri-action 自身は証明書をインポートしないため、ビルド前にこのステップで
      # 用意しておく。keychain のパスワードは使い捨てなので Secret にせず生成する。
      - name: Import Apple Developer certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          # 検索リストにも入れる。codesign は default keychain ではなく検索リストから
          # identity を引く。default-keychain だけでも実際には通る (v0.1.1 の同一手順で
          # 公証済み dmg がビルドできている) が、runner イメージの既定に依存しないよう明示する。
          security list-keychains -d user -s build.keychain
          # 検索リスト経由で Developer ID が引けることをここで確認し、駄目なら即失敗させる。
          # find-identity は identity が **0 件でも exit 0** なので、単に呼ぶだけでは
          # チェックにならない。grep で判定してビルドの奥で落ちるのを防ぐ。
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep -q "Developer ID Application" || {
            echo "Error: no 'Developer ID Application' identity in the keychain search list" >&2
            exit 1
          }
          rm "$RUNNER_TEMP/certificate.p12"

      # tauri.conf.json の version から v<version> タグの Release を作成し、
      # ビルド成果物をアップロードする。並列 matrix の片方だけで公開状態に
      # ならないよう draft で作成し、全プラットフォーム成功後に publish ジョブで公開する。
      # 注意: 公開済みバージョンと同じ version で再実行すると、tauri-action が
      # draft 状態の不一致でエラーになる。必ず version を上げてから実行すること
      # (scripts/release.sh が採番するので、通常は `pnpm release` から起動する)。
      # macOS の APPLE_* を渡すと tauri-action が Developer ID 署名 + 公証 + staple を
      # 自動で行う。Apple 認証情報を受け取るため、可変タグ @v0 ではなく commit SHA に
      # 固定する (タグが差し替えられて secrets を抜かれるサプライチェーン攻撃を防ぐ)。
      - name: Build and upload to GitHub Release (draft)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple 認証情報は macOS ジョブにのみ渡す (Windows では空文字にして露出させない)。
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        with:
          # tauri CLI を直接叩き、package.json の "tauri" スクリプトを迂回する。
          # あちらはローカル署名用に APPLE_SIGNING_IDENTITY を env 前置きで
          # ハードコードしており、Windows のシェルでは構文エラーになる。
          tauriScript: pnpm exec tauri
          tagName: v__VERSION__
          releaseName: QueryFolio v__VERSION__
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # 全プラットフォームのビルド・アップロードが成功した時のみ draft を公開する。
  # どれかが失敗した場合は draft のまま残る (不完全な Release は公開されない)。
  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          gh release edit "v${VERSION}" --draft=false --latest
